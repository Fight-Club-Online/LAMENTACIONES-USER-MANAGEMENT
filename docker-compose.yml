services:
  app:
    build: .
    image: lamentaciones-user-management:staging
    ports:
      - "8080:8080"
    environment:
      - MONGO_URI=mongodb://mongo:27017/ClubFight
      - MONGO_DATABASE=ClubFight
      - JWT_SECRET=${JWT_SECRET:-ARSW_SECRET_OSCAR_JUAN_SANTIAGO_GAME_CLUB_FIGHT_2026_SECURITY_KEY_}
      - JWT_EXPIRATION=${JWT_EXPIRATION:-3600000}
      - JWT_REFRESH_EXPIRATION=${JWT_REFRESH_EXPIRATION:-86400000}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-345044710231-2i6s7nu060ath19helab9g27ul2p043g.apps.googleusercontent.com}
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USERNAME=guest
      - RABBITMQ_PASSWORD=guest
      - RABBITMQ_VHOST=/
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=
      - REDIS_SSL=false
      - SPRING_DATA_REDIS_URL=redis://redis:6379
      - SPRING_PROFILES_ACTIVE=staging
    depends_on:
      mongo:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 8080 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 40s

  mongo:
    image: mongo:6.0
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  k6:
    image: grafana/k6:latest
    volumes:
      - ./load-tests:/scripts
    command: run /scripts/load_test.js
    depends_on:
      app:
        condition: service_healthy
    environment:
      - BASE_URL=http://app:8080

volumes:
  mongo-data: